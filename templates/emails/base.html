<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titre %}Makèt Peyizan{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f9;
      color: #2c3e50;
    }
    .wrapper {
      max-width: 600px;
      margin: 30px auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .header {
      background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
      padding: 32px 40px;
      text-align: center;
    }
    .header h1 { color: white; font-size: 24px; font-weight: 700; }
    .header p  { color: rgba(255,255,255,.8); font-size: 13px; margin-top: 4px; }
    .body      { padding: 36px 40px; }
    .greeting  { font-size: 16px; color: #2c3e50; margin-bottom: 16px; }
    .message   { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 24px; }
    .card {
      background: #f8fffe;
      border: 1px solid #d5f5e3;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eafaf1;
      font-size: 14px;
    }
    .card-row:last-child { border-bottom: none; }
    .card-label { color: #888; }
    .card-value { font-weight: 600; color: #2c3e50; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-vert   { background: #d5f5e3; color: #1e8449; }
    .badge-orange { background: #fef9e7; color: #e67e22; }
    .badge-rouge  { background: #fdedec; color: #e74c3c; }
    .badge-bleu   { background: #eaf4fb; color: #2980b9; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #27ae60;
      color: white !important;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      margin: 20px 0;
    }
    .table-produits {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    .table-produits th {
      background: #f0faf4;
      padding: 10px 12px;
      text-align: left;
      color: #888;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
    }
    .table-produits td {
      padding: 10px 12px;
      border-bottom: 1px solid #f5f5f5;
      color: #444;
    }
    .total-row td {
      font-weight: 700;
      color: #27ae60;
      font-size: 16px;
      border-top: 2px solid #d5f5e3;
    }
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    .footer {
      background: #f8f9fa;
      padding: 24px 40px;
      text-align: center;
      border-top: 1px solid #eee;
    }
    .footer p  { font-size: 12px; color: #aaa; line-height: 1.6; }
    .footer a  { color: #27ae60; text-decoration: none; }
    .alert-box {
      border-left: 4px solid #e74c3c;
      background: #fdedec;
      padding: 14px 18px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
      font-size: 14px;
      color: #c0392b;
    }
    .success-box {
      border-left: 4px solid #27ae60;
      background: #d5f5e3;
      padding: 14px 18px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
      font-size: 14px;
      color: #1e8449;
    }
    .info-box {
      border-left: 4px solid #2980b9;
      background: #eaf4fb;
      padding: 14px 18px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
      font-size: 14px;
      color: #2471a3;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>🌾 Makèt Peyizan</h1>
      <p>Marketplace agricole haïtienne</p>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>
        Cet email a été envoyé automatiquement par
        <a href="{{ site_url }}">Makèt Peyizan</a>.<br>
        © {% now "Y" %} Makèt Peyizan Haiti. Tous droits réservés.
      </p>
    </div>
  </div>
</body>
</html>
